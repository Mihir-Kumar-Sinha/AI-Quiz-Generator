<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Generator</title>
    <meta name="description" content="Generate dynamic quizzes using AI from your text or documents.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <div class="brain-icon">🧠</div>
                <h1>AI Quiz Generator</h1>
            </div>
            <p class="subtitle">Transform your notes into interactive quizzes instantly</p>
        </header>

        <main>
            <div class="layout-grid">
                <!-- Left Column: Input -->
                <section class="glass-panel input-section">
                    <h2>1. Provide Material</h2>
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="text">Paste Text</button>
                        <button class="tab-btn" data-tab="file">Upload File</button>
                    </div>

                    <div class="tab-content active" id="text-tab">
                        <textarea id="text-input" placeholder="Paste your study material, article, or notes here..."></textarea>
                    </div>

                    <div class="tab-content" id="file-tab">
                        <div class="file-upload-wrapper" id="drop-zone">
                            <input type="file" id="file-input" accept=".pdf,.docx,.txt" hidden>
                            <label for="file-input" class="file-upload-label">
                                <span class="upload-icon">📄</span>
                                <span class="upload-text">Drag & drop or <strong>click to browse</strong></span>
                                <span class="upload-hint">Supports PDF, DOCX, TXT</span>
                            </label>
                        </div>
                        <div id="file-status" class="file-status"></div>
                    </div>
                </section>

                <!-- Right Column: Settings -->
                <section class="glass-panel settings-section">
                    <h2>2. Configure Quiz</h2>
                    
                    <div class="form-group">
                        <label>Question Type</label>
                        <div class="toggle-group">
                            <input type="radio" id="type-mcq" name="qType" value="MCQ" checked>
                            <label for="type-mcq">Multiple Choice</label>
                            <input type="radio" id="type-qa" name="qType" value="Q/A">
                            <label for="type-qa">Short Answer</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="num-qs">Number of Questions</label>
                        <input type="number" id="num-qs" min="1" max="50" value="5">
                    </div>

                    <div class="form-group" id="opts-group">
                        <label for="num-opts">Options per Question</label>
                        <input type="number" id="num-opts" min="2" max="6" value="4">
                    </div>

                    <div class="form-group switch-group">
                        <label for="inc-ans">Include Answers</label>
                        <label class="switch">
                            <input type="checkbox" id="inc-ans" checked>
                            <span class="slider round"></span>
                        </label>
                    </div>

                    <div class="form-group switch-group">
                        <label for="inc-exp">Include Explanations</label>
                        <label class="switch">
                            <input type="checkbox" id="inc-exp" checked>
                            <span class="slider round"></span>
                        </label>
                    </div>
                    
                    <button id="generate-btn" class="primary-btn">
                        <span class="btn-text">Generate Quiz</span>
                        <span class="loader hidden"></span>
                    </button>
                    
                    <div id="error-message" class="error-banner hidden"></div>
                </section>
            </div>

            <!-- Results Section -->
            <section id="results-section" class="results-section hidden">
                <div class="results-header">
                    <h2>Your Quiz</h2>
                    <button id="reset-btn" class="secondary-btn">Create Another</button>
                </div>
                <div id="quiz-container" class="quiz-container">
                    <!-- Quiz cards will be injected here -->
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
